  <!-- ══ TAB ARCHIVES ══ -->
  <div id="tab-archives" class="tab-content">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem">
      <div style="display:flex;gap:.65rem;flex-wrap:wrap;align-items:center">
        <input class="search-bo" type="text" id="search-arc" placeholder="Rechercher client, véhicule…" oninput="loadArchives()"/>
        <select class="form-select" id="filter-arc-status" onchange="loadArchives()" style="max-width:180px">
          <option value="">Tous statuts</option>
          <option value="soumis">Soumis</option>
          <option value="en_cours">En cours</option>
          <option value="valide">Validés</option>
          <option value="refuse">Refusés</option>
        </select>
        <select class="form-select" id="filter-arc-type" onchange="loadArchives()" style="max-width:145px">
          <option value="">Tous types</option>
          <option value="achat">Achat</option>
          <option value="location">Location</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span style="font-size:.8rem;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);padding:.35rem .75rem;border-radius:var(--radius-sm)">
          Dossiers archivés — lecture seule / désarchivage possible
        </span>
      </div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Référence</th><th>Client</th><th>Véhicule</th><th>Type</th><th>Revenus/mois</th><th>Archivé le</th><th>Docs</th><th>Statut</th><th>Actions</th></tr></thead>
        <tbody id="archives-tbody"><tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--muted)">Chargement…</td></tr></tbody>
      </table>
    </div>
  </div>
