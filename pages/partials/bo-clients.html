  <!-- ══ TAB CLIENTS ══ -->
  <div id="tab-clients" class="tab-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem">
      <h2 style="font-size:1.05rem;font-weight:700;color:var(--primary)">Fiches clients</h2>
      <input class="search-bo" type="text" id="search-client" placeholder="Rechercher nom, e-mail…" oninput="filterClients()" style="max-width:280px"/>

      <table class="data-table">
        <thead><tr><th>Client</th><th>Email</th><th>Tél.</th><th>Inscrit le</th><th>Dossiers</th><th>Validés</th><th>Contrats</th><th>Actions</th></tr></thead>
        <tbody id="clients-tbody"><tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">Chargement…</td></tr></tbody>

    </div>
  </div>
